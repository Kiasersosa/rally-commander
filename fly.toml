# fly.toml app configuration file generated for rally-commander on 2026-05-02T21:12:29-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rally-commander'
primary_region = 'ewr'

[build]

[env]
  NEXT_TELEMETRY_DISABLED = '1'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
